<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Kalorické tabulky</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Kalorické tabulky</h1>

    <button onclick="dayShift(-1)"> ← </button>
    <button onclick="dayShift(1)"> → </button>

    <h2>dnešní datum datum: <span id="curentDay"> 1-1-1999 </span>  </h2>

    <h2>Celkem: <span id="total">0</span> kcal</h2>

    <div>
      <input id="food" placeholder="Jídlo">
      <input id="kcal" type="number" placeholder="Kalorie">
      <button onclick="addFood()" >Přidat</button>
    </div>

    <ul id="list"></ul>



    <script src="script.js"></script>
  </body>
</html>
