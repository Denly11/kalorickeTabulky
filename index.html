<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Kalorické tabulky</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Kalorické tabulky</h1>

    <button id="btnPrevDay"> ← </button>
    <button id="btnNextDay"> → </button>

    <h2>Datum: <span id="currentDay"> 1-1-1999 </span>  </h2>

    <h2>Celkem: <span id="total">0</span> kcal</h2>

    <div>
      <select id="foodSelect">
        <option value='{"name": "Jablko", "kcal_per_100grams": 52}'>Jablko</option>
        <option value='{"name": "Kuřecí prsa", "kcal_per_100grams": 165}'>Kuřecí prsa</option>
        <option value='{"name": "Rýže", "kcal_per_100grams": 130}'>Rýže (vařená)</option>
        <option value='{"name": "Chléb", "kcal_per_100grams": 265}'>Chléb</option>
      </select>
      <input id="grams" type="number" placeholder="Gramy">
      <button id="addButton">Přidat</button>
    </div>

    <ul id="list"></ul>

    <script src="script.js"></script>
  </body>
</html>
